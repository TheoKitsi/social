<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF79A8"/>
      <stop offset="100%" stop-color="#FF4081"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#12122A"/>
  <!--
    PRAGMA Logo: Two converging sight-lines
    Two angular viewfinder brackets facing each other,
    meeting at a convergence point.
  -->
  <g transform="translate(256, 256)">
    <!-- Left sight-line -->
    <path d="M -120,-120 L -40,-120 L 40,0 L -40,120 L -120,120 L -40,0 Z"
          fill="none" stroke="url(#g)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Right sight-line (mirror) -->
    <path d="M 120,-120 L 40,-120 L -40,0 L 40,120 L 120,120 L 40,0 Z"
          fill="none" stroke="url(#g)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Convergence diamond -->
    <rect x="-14" y="-14" width="28" height="28" rx="4" transform="rotate(45)"
          fill="url(#g)"/>
  </g>
</svg>
